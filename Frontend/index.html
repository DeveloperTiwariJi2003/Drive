<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f5f7fb;
      color: #1f1f1f;
      padding: 18px;
    }

    .dashboard {
      max-width: 1100px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 18px;
    }

    .header h1 {
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .header p {
      color: #666;
      font-size: 15px;
    }

    .ribbon {
      height: 78px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #ffffff;
      border: 1px solid #e6e6e6;
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
      margin-bottom: 18px;
    }

    .selection-bar {
      flex: 1;
      height: 52px;
      border: 1px dashed #cfcfcf;
      border-radius: 12px;
      background: #fafafa;
      display: flex;
      align-items: center;
      padding: 0 14px;
      overflow: hidden;
    }

    .selection-bar input[type="file"] {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 15px;
      cursor: pointer;
    }

    .upload-btn {
      height: 52px;
      min-width: 140px;
      border: none;
      border-radius: 12px;
      background: #111;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
      padding: 0 18px;
    }

    .upload-btn:hover {
      background: #000;
    }

    .panel {
      background: #fff;
      border: 1px solid #e6e6e6;
      border-radius: 18px;
      padding: 24px 28px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
    }

    .panel h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .panel .subtext {
      color: #666;
      margin-bottom: 18px;
      font-size: 15px;
    }

    ul#files {
      list-style: none;
      margin-top: 18px;
      padding: 0;
    }

    ul#files li {
      background: #f8f9fc;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
      font-size: 15px;
      color: #333;
    }

    #confirmation {
      margin-top: 16px;
      font-size: 15px;
      font-weight: 600;
      color: #0a7a2f;
      min-height: 20px;
    }

    @media (max-width: 640px) {
      .ribbon {
        flex-direction: column;
        height: auto;
        align-items: stretch;
      }

      .upload-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header">
      <h1>Dashboard</h1>
      <p>Upload multiple files from the ribbon bar below.</p>
    </div>

    <div class="ribbon">
      <div class="selection-bar">
        <input type="file" name="data" id="Manyfile" multiple />
      </div>
      <button type="button" class="upload-btn" onclick="sendManyFiles()">Upload</button>
    </div>

    <div class="panel">
      <h2>Uploaded Files</h2>
      <p class="subtext">Files will appear here after you click showFiles.</p>
      <button type="button" onclick="showFiles()" class="upload-btn" style="margin-bottom: 12px; width: 160px;">Show Files</button>
      <ul id="files"></ul>
      <div id="confirmation"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
