<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f7fb;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .welcome {
      text-align: center;
      margin-bottom: 28px;
    }

    .welcome h1 {
      font-size: 42px;
      font-weight: 700;
      color: #1f1f1f;
      margin-bottom: 10px;
    }

    .welcome p {
      font-size: 18px;
      color: #666;
    }

    .card {
      background: #fff;
      border: 1px solid #e6e6e6;
      border-radius: 18px;
      padding: 32px 28px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
    }

    .card h2 {
      font-size: 28px;
      margin-bottom: 8px;
      color: #1f1f1f;
    }

    .card .subtext {
      color: #666;
      margin-bottom: 28px;
      font-size: 16px;
    }

    .form-group {
      margin-bottom: 22px;
    }

    .form-group label {
      display: block;
      margin-bottom: 10px;
      font-size: 16px;
      font-weight: 600;
      color: #222;
    }

    .input-box {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px 16px;
      background: #fff;
      transition: 0.3s ease;
    }

    .input-box:focus-within {
      border-color: #111;
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.06);
    }

    .input-box input {
      border: none;
      outline: none;
      width: 100%;
      font-size: 16px;
      background: transparent;
    }

    .input-box input::placeholder {
      color: #999;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 14px;
      background: #111;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #000;
    }

    #alert {
      margin-top: 14px;
      text-align: center;
      color: red;
      font-size: 14px;
      min-height: 20px;
    }

    .bottom-text {
      text-align: center;
      margin-top: 22px;
      color: #555;
      font-size: 15px;
    }

    .bottom-text button {
      border: none;
      background: none;
      color: #111;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }

    .bottom-text button:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .welcome h1 {
        font-size: 32px;
      }

      .card {
        padding: 24px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="welcome">
      <h1>Welcome Back</h1>
      <p>Sign in to your account to continue</p>
    </div>

    <div class="card">
      <h2>Sign Up</h2>
      <p class="subtext">Create your account to get started</p>

      <form id="signup" action="/signup" method="post">
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-box">
            <input type="email" name="email" id="email" placeholder="Enter your email" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-box">
            <input type="password" name="password" id="password" placeholder="Enter your password" required>
          </div>
        </div>

        <div class="form-group">
          <label for="name">Name</label>
          <div class="input-box">
            <input type="text" name="name" id="name" placeholder="Enter your name" required>
          </div>
        </div>

        <button type="button" class="btn" onclick="signUp()">Sign Up</button>
        <p id="alert" name="message"></p>

        <div class="bottom-text">
          <p>Already have an account? <button type="button" onclick="login()">Login</button></p>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="signup.js"></script>
</body>
</html>
